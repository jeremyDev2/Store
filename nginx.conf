upstream django {
    server web:8000;
}

server {
    listen 80;

    # статические файлы отдаёт Nginx напрямую, не через Django
    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    # все остальные запросы проксируем в Gunicorn
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
